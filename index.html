<!DOCTYPE html>
<html>
<head>
    <title>DRC Flood & Hospital Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        #map { height: 600px; width: 100%; }
        body { font-family: Arial, sans-serif; margin: 20px; }
        .legend { background: white; padding: 10px; line-height: 1.5; border: 1px solid #ccc; border-radius: 5px; }
    </style>
</head>
<body>
    <h1>DRC Flood & Hospital Map</h1>
    <p>This map shows flood locations (blue) and hospitals (red) in the Democratic Republic of the Congo.</p>
    
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        // 1. Initialize the map
        var map = L.map('map').setView([-4.038, 21.758], 5);

        // 2. Add background tiles
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        // 3. Define different marker styles
        // Blue circle for Floods
        function floodMarker(lat, lng, popupText) {
            L.circleMarker([lat, lng], {
                radius: 8,
                fillColor: "#3388ff",
                color: "#000",
                weight: 1,
                opacity: 1,
                fillOpacity: 0.8
            }).addTo(map).bindPopup(popupText);
        }

        // Red circle for Hospitals
        function hospitalMarker(lat, lng, popupText) {
            L.circleMarker([lat, lng], {
                radius: 6,
                fillColor: "#ff4444",
                color: "#000",
                weight: 1,
                opacity: 1,
                fillOpacity: 0.9
            }).addTo(map).bindPopup(popupText);
        }

        // 4. Load Flood Data
        fetch('drc_floods.json')
            .then(response => response.json())
            .then(data => {
                data.forEach(flood => {
                    if (flood.lat && flood.long) {
                        var popup = "<b>Flood Event</b><br>" +
                                   "Date: " + (flood.Began || 'N/A') + "<br>" +
                                   "Dead: " + (flood.Dead || 0);
                        floodMarker(flood.lat, flood.long, popup);
                    }
                });
            });

        // 5. Load Hospital Data (from Overpass API result)
        fetch('drc_hospitals.json')
            .then(response => response.json())
            .then(data => {
                data.elements.forEach(hospital => {
                    // Overpass returns lat/lon for nodes, and 'center' for ways/relations
                    var lat = hospital.lat || (hospital.center ? hospital.center.lat : null);
                    var lon = hospital.lon || (hospital.center ? hospital.center.lon : null);
                    
                    if (lat && lon) {
                        var name = hospital.tags.name || "Unnamed Hospital";
                        var type = hospital.tags.amenity || "Hospital";
                        var popup = "<b>" + name + "</b><br>Type: " + type;
                        hospitalMarker(lat, lon, popup);
                    }
                });
            });

        // 6. Add a simple legend
        var legend = L.control({position: 'bottomright'});
        legend.onAdd = function (map) {
            var div = L.DomUtil.create('div', 'legend');
            div.innerHTML += '<b>Legend</b><br>';
            div.innerHTML += '<i style="background: #3388ff; width: 10px; height: 10px; display: inline-block; border-radius: 50%;"></i> Flood Event<br>';
            div.innerHTML += '<i style="background: #ff4444; width: 10px; height: 10px; display: inline-block; border-radius: 50%;"></i> Hospital<br>';
            return div;
        };
        legend.addTo(map);

    </script>
</body>
</html>
