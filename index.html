<!DOCTYPE html>
<html>
<head>
    <title>DRC Health Facility Flood Risk Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        #map { height: 600px; width: 100%; }
        body { font-family: Arial, sans-serif; margin: 20px; }
        .legend { background: white; padding: 10px; border: 1px solid #ccc; border-radius: 5px; line-height: 1.5; }
        .legend i { width: 10px; height: 10px; display: inline-block; border-radius: 50%; margin-right: 5px; }
        .controls { margin-bottom: 10px; padding: 10px; background: #f8f9fa; border-radius: 5px; border: 1px solid #ddd; }
        button { padding: 8px 15px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 4px; font-weight: bold; }
        button:hover { background: #0056b3; }
        button.active { background: #dc3545; }

        /* PULSING ANIMATION FOR RISK SITES */
        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.5); opacity: 0.5; }
            100% { transform: scale(1); opacity: 1; }
        }

        .pulse-marker {
            animation: pulse 1.5s infinite ease-in-out;
            transform-origin: center;
        }
    </style>
</head>
<body>
    <h1>DRC Health Facilities: Flood Risk Analysis</h1>
    
    <div class="controls">
        <strong>Map Filters:</strong> 
        <button id="showAll" onclick="filterMap('all')">Show All Health Sites</button>
        <button id="showRisk" onclick="filterMap('risk')" style="background:#ff00ff">Show ONLY Sites at Risk (1km)</button>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        var map = L.map('map').setView([-4.038, 21.758], 5);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        var floodLayer = L.layerGroup().addTo(map);
        var allHealthLayer = L.layerGroup().addTo(map);
        var riskLayer = L.layerGroup().addTo(map);

        // Helper to create circle markers
        function createMarker(lat, lng, options, popupText, layer) {
            return L.circleMarker([lat, lng], options).addTo(layer).bindPopup(popupText);
        }

        // 1. Load All Floods
        fetch('drc_floods.json')
            .then(response => response.json())
            .then(data => {
                data.forEach(flood => {
                    if (flood.lat && flood.long) {
                        createMarker(flood.lat, flood.long, {
                            radius: 8, fillColor: "#3388ff", color: "#000", weight: 1, opacity: 1, fillOpacity: 0.4
                        }, "<b>Flood Event</b><br>Date: " + flood.Began, floodLayer);
                    }
                });
            });

        // 2. Load All Health Sites
        fetch('drc_health_infrastructure.json')
            .then(response => response.json())
            .then(data => {
                data.elements.forEach(site => {
                    var lat = site.lat || (site.center ? site.center.lat : null);
                    var lon = site.lon || (site.center ? site.center.lon : null);
                    if (lat && lon) {
                        var tags = site.tags || {};
                        var popup = "<b>" + (tags.name || "Unnamed Site") + "</b><br>Type: " + tags.amenity;
                        createMarker(lat, lon, {
                            radius: 4, fillColor: "#888888", color: "#000", weight: 1, opacity: 1, fillOpacity: 0.3
                        }, popup, allHealthLayer);
                    }
                });
            });

        // 3. Load At-Risk Sites with ANIMATION
        fetch('sites_at_risk.json')
            .then(response => response.json())
            .then(data => {
                data.elements.forEach(site => {
                    var lat = site.lat || (site.center ? site.center.lat : null);
                    var lon = site.lon || (site.center ? site.center.lon : null);
                    if (lat && lon) {
                        var tags = site.tags || {};
                        var popup = "<b><span style='color:red'>⚠️ AT RISK (within 1km)</span></b><br>" +
                                   "<b>Name:</b> " + (tags.name || "Unnamed") + "<br>" +
                                   "<b>Distance:</b> " + tags.distance_to_flood + " km";
                        
                        // We add 'className: "pulse-marker"' to trigger the CSS animation
                        createMarker(lat, lon, {
                            radius: 10, 
                            fillColor: "#ff00ff", 
                            color: "#000", 
                            weight: 2, 
                            opacity: 1, 
                            fillOpacity: 1,
                            className: "pulse-marker" 
                        }, popup, riskLayer);
                    }
                });
            });

        function filterMap(mode) {
            if (mode === 'risk') {
                map.removeLayer(allHealthLayer);
                map.addLayer(riskLayer);
                document.getElementById('showRisk').classList.add('active');
                document.getElementById('showAll').classList.remove('active');
            } else {
                map.addLayer(allHealthLayer);
                map.addLayer(riskLayer);
                document.getElementById('showAll').classList.add('active');
                document.getElementById('showRisk').classList.remove('active');
            }
        }

        var legend = L.control({position: 'bottomright'});
        legend.onAdd = function (map) {
            var div = L.DomUtil.create('div', 'legend');
            div.innerHTML += '<b>Map Key</b><br>';
            div.innerHTML += '<i style="background: #ff00ff; border: 2px solid black;"></i> <b>Warning: At-Risk Site</b><br>';
            div.innerHTML += '<i style="background: #3388ff"></i> Recorded Flood<br>';
            div.innerHTML += '<i style="background: #888888"></i> Normal Health Site<br>';
            return div;
        };
        legend.addTo(map);

        filterMap('all');
    </script>
</body>
</html>
